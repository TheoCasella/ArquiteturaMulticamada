<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Digital - Protótipo Multicamada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-indigo-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold"><i class="fas fa-book"></i> LibDoc IA</h1>
            <button onclick="aplicarDesconto()" class="bg-orange-500 hover:bg-orange-600 px-4 py-2 rounded-lg font-bold transition">
                <i class="fas fa-tag"></i> APLICAR 10% OFF
            </button>
        </div>
    </nav>

    <header class="text-center py-10">
        <h2 class="text-3xl font-bold text-gray-800">Catálogo de Livros</h2>
        <div class="container mx-auto px-4 mt-6">
        <div class="relative max-w-xl mx-auto">
            <input
                type="text"
                id="inputBusca"
                onkeyup="executarBusca()"
                placeholder="Buscar por título ou autor..."
                class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition shadow-sm"
            >
                <div class="absolute left-4 top-3.5 text-gray-400">
                    <i class="fas fa-search"></i>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-20">
        <div id="livrosContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <p class="text-center col-span-3 text-gray-400">Carregando livros...</p>
        </div>
    </main>

    <div id="modalPagamento" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center max-w-sm w-full mx-4">
            <h3 class="text-xl font-bold text-gray-800 mb-2">Finalizar Compra</h3>
            <p id="livroSelecionado" class="text-indigo-600 font-medium mb-4"></p>

            <div class="bg-gray-50 p-4 rounded-xl mb-4 inline-block">
                <img id="qrCodeImg" src="" alt="QR Code" class="mx-auto border-4 border-white shadow-sm">
            </div>

            <p class="text-xs text-gray-500 mb-6 uppercase tracking-widest">Escaneie o QR Code para pagar via PIX</p>

            <button onclick="fecharModal()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 rounded-xl transition">
                FECHAR
            </button>
        </div>
    </div>

    <script>
        // 1. Renderiza os livros na tela
        function renderizar(livros) {
            const container = document.getElementById('livrosContainer');
            container.innerHTML = '';

            livros.forEach(l => {
                container.innerHTML += `
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition">
                        <div class="h-40 bg-indigo-50 flex items-center justify-center text-indigo-200">
                            <i class="fas fa-file-alt fa-4x"></i>
                        </div>
                        <div class="p-5">
                            <h3 class="font-bold text-gray-800 text-lg">${l.titulo}</h3>
                            <p class="text-gray-500 text-sm mb-4">${l.autor}</p>
                            <div class="flex justify-between items-center">
                                <span class="text-xl font-black text-indigo-700">R$ ${l.preco.toFixed(2)}</span>
                                <button onclick="abrirDetalhes('${l.titulo}')" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-indigo-700">
                                    Detalhes
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 2. Busca inicial de livros
        async function carregarLivros() {
            try {
                const res = await fetch('/api/buscar');
                const dados = await res.json();
                renderizar(dados);
            } catch (e) {
                console.error("Erro ao carregar livros", e);
            }
        }

        // 3. Lógica do Desconto Único com Pop-up
        async function aplicarDesconto() {
            const res = await fetch('/api/promocao', { method: 'POST' });

            if (res.status === 400) {
                // Pop-up solicitado quando clica 2x ou mais
                alert("Desconto já foi aplicado anteriormente, aproveite!");
            } else if (res.ok) {
                const dados = await res.json();
                renderizar(dados);
                alert("Desconto de 10% aplicado com sucesso!");
            }
        }

        // 4. Lógica do Modal e QR Code Fixo
        function abrirDetalhes(titulo) {
            document.getElementById('livroSelecionado').innerText = titulo;

            // Gerador de QR Code Fixo (API do Google ou QRServer)
            const qrData = encodeURIComponent(`Pagamento: ${titulo}`);
            document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${qrData}`;

            document.getElementById('modalPagamento').classList.remove('hidden');
        }

        function fecharModal() {
            document.getElementById('modalPagamento').classList.add('hidden');
        }

        // Iniciar aplicação
        window.onload = carregarLivros;
    </script>
</body>
</html>
